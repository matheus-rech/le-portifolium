<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f14 0%, #1a1a2e 100%);
      font-family: system-ui, sans-serif;
    }
    .container { text-align: center; }
    h1 {
      font-size: 3.5rem;
      background: linear-gradient(90deg, #c9a96e, #e8d5a8, #c9a96e);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    p { color: #8b8994; margin-top: 0.75rem; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, World</h1>
    <p>This is a sample artifact in your gallery.</p>
  </div>
</body>
</html>
