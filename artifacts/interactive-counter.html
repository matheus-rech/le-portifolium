<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f14;
      font-family: system-ui, sans-serif;
      color: #e8e6e3;
    }
    .counter {
      text-align: center;
    }
    .count {
      font-size: 6rem;
      font-weight: 200;
      color: #c9a96e;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: transform 0.15s;
    }
    .count.bump { transform: scale(1.1); }
    .buttons {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid #2a2a32;
      background: #16161a;
      color: #e8e6e3;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      border-color: #c9a96e;
      background: rgba(201,169,110,0.1);
    }
  </style>
</head>
<body>
  <div class="counter">
    <div class="count" id="count">0</div>
    <div class="buttons">
      <button onclick="update(-1)">-</button>
      <button onclick="update(1)">+</button>
    </div>
  </div>
  <script>
    let n = 0;
    const el = document.getElementById('count');
    function update(d) {
      n += d;
      el.textContent = n;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 150);
    }
  </script>
</body>
</html>
