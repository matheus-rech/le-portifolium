<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'JetBrains Mono', monospace;
      background: #0c0c0f;
      color: #e8e6e3;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #16161a;
      border-bottom: 1px solid #2a2a32;
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
    }

    .toolbar .filename {
      color: #c9a96e;
      font-weight: 500;
    }

    .toolbar .meta {
      color: #8b8994;
    }

    .content {
      padding: 1.2rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.85rem;
      line-height: 1.65;
      tab-size: 2;
    }

    .line-numbers {
      display: flex;
    }

    .line-numbers .gutter {
      flex-shrink: 0;
      padding-right: 1rem;
      text-align: right;
      color: #3a3a44;
      user-select: none;
      border-right: 1px solid #1e1e24;
      margin-right: 1rem;
    }

    .line-numbers .code {
      flex: 1;
      overflow-x: auto;
    }

    /* Syntax hints for common patterns */
    .loading { text-align: center; padding: 3rem; color: #8b8994; }
    .error { color: #e06c5a; padding: 2rem; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="filename" id="filename">Loading...</span>
    <span class="meta" id="meta"></span>
  </div>
  <div class="content" id="content"><div class="loading">Loading...</div></div>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file');
      if (!file) {
        document.getElementById('content').innerHTML = '<div class="error">No file specified.</div>';
        return;
      }

      const filename = file.split('/').pop();
      document.getElementById('filename').textContent = filename;
      document.title = filename;

      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`Failed to load: ${res.status}`);
        const text = await res.text();

        const lines = text.split('\n');
        document.getElementById('meta').textContent = `${lines.length} lines`;

        const gutter = lines.map((_, i) => i + 1).join('\n');
        const escaped = text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        document.getElementById('content').innerHTML = `
          <div class="line-numbers">
            <pre class="gutter">${gutter}</pre>
            <pre class="code">${escaped}</pre>
          </div>`;
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="error">${err.message}</div>`;
      }
    })();
  </script>
</body>
</html>
