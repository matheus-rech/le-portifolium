<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 2.5rem;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      line-height: 1.7;
      color: #e8e6e3;
      background: #0c0c0f;
      max-width: 780px;
      margin: 0 auto;
    }
    h1, h2, h3, h4 { color: #fff; margin-top: 2rem; margin-bottom: 0.5rem; line-height: 1.3; }
    h1 { font-size: 2rem; border-bottom: 1px solid #2a2a32; padding-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; }
    a { color: #c9a96e; }
    code {
      font-family: 'IBM Plex Mono', monospace;
      background: #16161a;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.88em;
    }
    pre {
      background: #16161a;
      border: 1px solid #2a2a32;
      border-radius: 8px;
      padding: 1.2rem;
      overflow-x: auto;
    }
    pre code { background: none; padding: 0; }
    blockquote {
      border-left: 3px solid #c9a96e;
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      color: #8b8994;
    }
    img { max-width: 100%; border-radius: 8px; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #2a2a32; padding: 0.6rem 0.8rem; text-align: left; }
    th { background: #16161a; }
    hr { border: none; border-top: 1px solid #2a2a32; margin: 2rem 0; }
    .loading { text-align: center; padding: 3rem; color: #8b8994; }
    .error { color: #e06c5a; padding: 2rem; font-family: monospace; }
  </style>
</head>
<body>
  <div id="content"><div class="loading">Loading...</div></div>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file');
      if (!file) {
        document.getElementById('content').innerHTML = '<div class="error">No file specified.</div>';
        return;
      }
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`Failed to load: ${res.status}`);
        const md = await res.text();
        document.getElementById('content').innerHTML = marked.parse(md);
        document.title = file.split('/').pop().replace(/\.[^.]+$/, '');
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="error">${err.message}</div>`;
      }
    })();
  </script>
</body>
</html>
